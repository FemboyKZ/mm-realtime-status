name: Build and release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 1.0.0)'
        required: true

jobs:
  build:
    if: github.ref == 'refs/heads/main'
    name: Build
    uses: ./.github/workflows/build.yaml
    with:
      version: ${{ github.event.inputs.version }}

  release:
    if: github.ref == 'refs/heads/main'
    name: Release
    runs-on: ubuntu-latest
    needs:
      - build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: /home/runner/artifacts

      - name: Create folders
        run: mkdir /home/runner/releases

      - name: Archive Linux build
        run: |
          cd /home/runner/artifacts/mm-cs2kz-rts-linux
          tar -czvf /home/runner/releases/mm-cs2kz-rts-linux-v${{ inputs.version }}.tar.gz *

      - name: Archive Windows build
        run: |
          cd /home/runner/artifacts/mm-cs2kz-rts-windows
          zip -r /home/runner/releases/mm-cs2kz-rts-windows-v${{ inputs.version }}.zip *

      - name: Create GitHub Tag
        run: |
          git config --global user.email "${{ github.repository_owner_id }}+${{ github.repository_owner }}@users.noreply.github.com"
          git config --global user.name "${{ github.repository_owner }}"
          git tag -a v${{ inputs.version }} -m "Release v${{ inputs.version }}"
          git push origin v${{ inputs.version }}

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          files: |
            /home/runner/releases/mm-cs2kz-rts-linux-v${{ inputs.version }}.tar.gz
            /home/runner/releases/mm-cs2kz-rts-windows-v${{ inputs.version }}.zip
          generate_release_notes: true
          prerelease: false
