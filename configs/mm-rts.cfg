// MM CS2KZ Realtime Status - Configuration
// Place in: csgo/addons/mm-cs2kz-rts/mm-rts.cfg

// API endpoint URL (required)
"api_url"       ""

// API key for authentication (optional, sent as Bearer token)
"api_key"       ""

// Server IP override (leave empty to auto-detect from hostip)
"server_ip"     ""

// Server port override (leave empty or 0 to auto-detect from hostport)
"server_port"   "0"

// Reporting interval in seconds (minimum 1, default 10)
"interval"      "10"
